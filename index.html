      if (params.has("desktop")) {

      var ua = navigator.userAgent || "";
      var isMobile =

    })();

  <style>
:root {
  --bg-1: #f3ebe4;
  --bg-2: #e8f0f2;
  --bg-3: #f0e8ef;
  --ink: #4a4458;
  --ink-soft: #7a7388;
  --btn: #c4a8b8;
  --btn-text: #fffaf8;
  --result-bg: #ffffff66;
  --shadow: 0 18px 40px rgba(90, 70, 90, 0.12);
  --pastel-a: #f7d6d0;
  --pastel-b: #d8e8e2;
  --pastel-c: #e4d6f0;
  --pastel-d: #f5e6c8;
  --pastel-e: #cdd9f0;
  --pastel-f: #e8d4d8;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(ellipse 90% 55% at 15% 12%, #f8dfe8 0%, transparent 55%),
    radial-gradient(ellipse 80% 45% at 90% 10%, #d9ebe8 0%, transparent 50%),
    radial-gradient(ellipse 70% 50% at 75% 90%, #e6dff0 0%, transparent 50%),
    linear-gradient(165deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
  display: flex;
  flex-direction: column;
  align-items: center;
  padding:
    calc(0.85rem + var(--safe-top))
    calc(1rem + var(--safe-right))
    calc(1.25rem + var(--safe-bottom))
    calc(1rem + var(--safe-left));
  overflow-x: hidden;
  overscroll-behavior-y: none;
  touch-action: manipulation;
}

body.modal-open {
  overflow: hidden;
  position: fixed;
  width: 100%;
}

h1 {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  font-size: 1.75rem;
  letter-spacing: 0.02em;
  color: var(--ink);
  margin-bottom: 0.85rem;
  opacity: 0;
  animation: fadeDown 0.8s ease forwards;
}

.spin-btn {
  appearance: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: 0.03em;
  color: var(--btn-text);
  background: linear-gradient(145deg, #d4b4c4, var(--btn) 40%, #b8c9c4);
  min-height: 48px;
  padding: 0.9rem 1.75rem;
  border-radius: 999px;
  box-shadow:
    0 10px 28px rgba(140, 110, 130, 0.28),
    inset 0 1px 0 rgba(255, 255, 255, 0.35);
  transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
  margin-bottom: 1.25rem;
  opacity: 0;
  animation: fadeDown 0.8s ease 0.12s forwards;
}

.spin-btn:active:not(:disabled) {
  transform: scale(0.98);
}

.spin-btn:disabled {
  cursor: not-allowed;
  opacity: 0.72;
  filter: grayscale(0.15);
}

.stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.35rem;
  width: 100%;
  max-width: 360px;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.2s forwards;
}

.wheel-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.55rem;
  width: 100%;
}

.wheel-wrap {
  position: relative;
  width: min(82vw, 320px);
  aspect-ratio: 1;
  filter: drop-shadow(0 14px 24px rgba(100, 80, 100, 0.14));
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  border: 5px solid rgba(255, 255, 255, 0.75);
  box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35);
  transition: transform 0s;
  will-change: transform;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

.wheel.spinning {
  transition-timing-function: cubic-bezier(0.08, 0.7, 0.1, 1);
}

.hub {
  position: absolute;
  inset: 50%;
  width: 18%;
  height: 18%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: linear-gradient(145deg, #fff8f5, #e8dce6);
  border: 3px solid rgba(255, 255, 255, 0.9);
  box-shadow: var(--shadow);
  z-index: 2;
  pointer-events: none;
}

.label {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 40%;
  transform-origin: center center;
  text-align: center;
  font-size: clamp(0.62rem, 3.2vw, 0.78rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--ink);
  pointer-events: none;
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: break-word;
  hyphens: auto;
}

.caption {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9a8798;
      min-height: 2rem;
    }
    .caption .gear-icon {
      width: 2.15rem;
      height: 2.15rem;
    }
    .caption .gear-icon-bottom {
      width: 2.55rem;
      height: 2.55rem;
    }

.wheel-block.top .caption {
  margin-top: 0.35rem;
  margin-bottom: 0.15rem;
}

.wheel-block.bottom .caption {
  margin-top: 0.15rem;
  margin-bottom: 0.35rem;
}


.result {
  margin-top: 1.25rem;
  min-height: 4.25rem;
  width: 100%;
  max-width: 360px;
  padding: 1rem 1.1rem;
  border-radius: 1.15rem;

  transform: translateY(10px);

  justify-content: center;
}

.result.visible {

}

.result-inner {
  width: max-content;

  text-align: left;
}

.result-title {

  margin-bottom: 0.4rem;

}

.result-line {

.result-row {

}

.field-hint {

  <script>
const STORAGE_KEY = "wardrobe-wheels-v1";

const DEFAULT_TOP = [
  "Біла блузка",
  "Синя футболка",
  "Блакитна блуза",
  "Біла блузка з квітами",
];

const DEFAULT_BOTTOM = [
  "Чорні штани",
  "Жовті штани",
  "Чорна спідниця",
  "Сіра спідниця",
  "Білі штани",
];

const PASTELS = [
  "var(--pastel-a)",
  "var(--pastel-b)",
  "var(--pastel-c)",
  "var(--pastel-d)",
  "var(--pastel-e)",
  "var(--pastel-f)",
];

/**
 * Vertical mobile layout:
 * top wheel → bottom edge toward arrow = 180°
 * bottom wheel → top edge toward arrow = 0°
 */
const POINTER_TOP = 180;
const POINTER_BOTTOM = 0;

const wheelTop = document.getElementById("wheelTop");
const wheelBottom = document.getElementById("wheelBottom");
const spinBtn = document.getElementById("spinBtn");
const result = document.getElementById("result");
const resultText = document.getElementById("resultText");
const adminBtn = document.getElementById("adminBtn");
const adminModal = document.getElementById("adminModal");
const adminClose = document.getElementById("adminClose");
const adminForm = document.getElementById("adminForm"); // wardrobe panel
const adminError = document.getElementById("adminError");

const KIND_META = {
  top: { label: "верх", iconClass: "gear-icon gear-icon-top" },
  bottom: { label: "низ", iconClass: "gear-icon gear-icon-bottom" },
};
const wardrobeBlock = document.getElementById("wardrobeBlock");
const kindTrigger = document.getElementById("kindTrigger");
const kindMenu = document.getElementById("kindMenu");
const kindIcon = document.getElementById("kindIcon");
const kindLabel = document.getElementById("kindLabel");
const ICON_SRC = {
  top: kindMenu.querySelector('[data-kind="top"] img').src,
  bottom: kindMenu.querySelector('[data-kind="bottom"] img').src,
};

function setAdminKind(kind, { refresh = true } = {}) {
  if (kind !== "top" && kind !== "bottom") kind = "top";
  wardrobeBlock.dataset.kind = kind;
  const meta = KIND_META[kind];
  kindIcon.src = ICON_SRC[kind];
  kindIcon.className = "kind-icon " + meta.iconClass;
  kindLabel.textContent = meta.label;
  kindMenu.querySelectorAll(".kind-option").forEach((opt) => {
    const on = opt.dataset.kind === kind;
    opt.setAttribute("aria-selected", on ? "true" : "false");
  });
  closeKindMenu();
  closeEditor(wardrobeBlock);
  setAdminMessage("");
  if (refresh) {
    const list = wardrobeBlock.querySelector(".item-list");
    list.setAttribute("aria-label", meta.label);
    if (list.tagName === "SELECT") list.value = "";
    else list.dataset.selected = "";
    refreshAdminLists();
  }
}

function openKindMenu() {
  kindMenu.hidden = false;
  kindTrigger.setAttribute("aria-expanded", "true");
}

function closeKindMenu() {
  kindMenu.hidden = true;
  kindTrigger.setAttribute("aria-expanded", "false");
}

function toggleKindMenu() {
  if (kindMenu.hidden) openKindMenu();
  else closeKindMenu();
}


let topItems = [];
let bottomItems = [];
let rotationTop = 0;
let rotationBottom = 0;
let busy = false;
let resizeTimer = null;

function loadWardrobe() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (
      !Array.isArray(data.top) ||
      !Array.isArray(data.bottom) ||
      !data.top.length ||
      !data.bottom.length
    ) {
      return null;
    }
    return {
      top: data.top.map((item) => capitalizeFirstWord(String(item))),
      bottom: data.bottom.map((item) => capitalizeFirstWord(String(item))),
    };
  } catch {
    return null;
  }
}

function saveWardrobe(top, bottom) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ top, bottom }));
}

function assignSectorColors(count) {
  const colors = [];
  for (let i = 0; i < count; i++) {
    const prev = i > 0 ? colors[i - 1] : null;
    const wrap = i === count - 1 && count > 1 ? colors[0] : null;
    let idx = i % PASTELS.length;
    let chosen = PASTELS[idx];
    for (let attempt = 0; attempt < PASTELS.length; attempt++) {
      const candidate = PASTELS[(idx + attempt) % PASTELS.length];
      if (candidate !== prev && candidate !== wrap) {
        chosen = candidate;
        break;
      }
    }
    colors.push(chosen);
  }
  return colors;
}

function buildWheel(el, items, direction = "outward") {
  const n = items.length;
  const step = 360 / n;
  const sectorColors = assignSectorColors(n);
  const stops = items
    .map((_, i) => `${sectorColors[i]} ${i * step}deg ${(i + 1) * step}deg`)
    .join(", ");

  el.style.background = `conic-gradient(from -${step / 2}deg, ${stops})`;
  el.innerHTML = "";

  const radius = el.clientWidth * 0.30;
  const fontScale = n > 8 ? Math.max(0.55, 1 - (n - 8) * 0.04) : 1;
  const textAngle = direction === "inward" ? 90 : -90;

  items.forEach((text, i) => {
    const label = document.createElement("div");
    label.className = "label";
    label.style.fontSize = `calc(${fontScale} * clamp(0.62rem, 3.2vw, 0.78rem))`;
    const mid = i * step;
    label.style.transform =
      `translate(-50%, -50%) rotate(${mid}deg) translateY(${-radius}px) rotate(${textAngle}deg)`;
    label.textContent = text;
    el.appendChild(label);
  });
}

function rebuildWheels({ clearResult = false } = {}) {
  const topAngle = normalizeAngle(rotationTop);
  const bottomAngle = normalizeAngle(rotationBottom);
  buildWheel(wheelTop, topItems, "outward");
  buildWheel(wheelBottom, bottomItems, "inward");
  wheelTop.style.transition = "none";
  wheelBottom.style.transition = "none";
  rotationTop = topAngle;
  rotationBottom = bottomAngle;
  wheelTop.style.transform = `rotate(${rotationTop}deg)`;
  wheelBottom.style.transform = `rotate(${rotationBottom}deg)`;
  if (clearResult) {
    result.classList.remove("visible");
  }

function normalizeAngle(deg) {
  return ((deg % 360) + 360) % 360;
}

function sectorAtPointer(rotation, itemCount, pointerAngle) {
  const step = 360 / itemCount;
  const local = normalizeAngle(pointerAngle - rotation);
  return Math.round(local / step) % itemCount;
}

function randomDurationMs() {
  return 5000 + Math.random() * 5000;
}

function randomExtraTurns() {
  return 6 + Math.floor(Math.random() * 5);
}

function targetRotation(current, itemCount, pointerAngle, targetIndex) {
  const step = 360 / itemCount;
  const desiredMod = normalizeAngle(pointerAngle - targetIndex * step);
  const currentMod = normalizeAngle(current);
  let delta = normalizeAngle(desiredMod - currentMod);
  delta += randomExtraTurns() * 360;
  return current + delta;
}

function spin() {
  if (busy) return;
  if (!topItems.length || !bottomItems.length) return;

  busy = true;
  spinBtn.disabled = true;
  result.classList.remove("visible");

  const duration = randomDurationMs();
  const topIndex = Math.floor(Math.random() * topItems.length);
  const bottomIndex = Math.floor(Math.random() * bottomItems.length);

  rotationTop = targetRotation(rotationTop, topItems.length, POINTER_TOP, topIndex);
  rotationBottom = targetRotation(rotationBottom, bottomItems.length, POINTER_BOTTOM, bottomIndex);

  wheelTop.classList.add("spinning");
  wheelBottom.classList.add("spinning");
  wheelTop.style.transition = `transform ${duration}ms cubic-bezier(0.08, 0.72, 0.12, 1)`;
  wheelBottom.style.transition = `transform ${duration}ms cubic-bezier(0.05, 0.68, 0.1, 1)`;
  wheelTop.style.transform = `rotate(${rotationTop}deg)`;
  wheelBottom.style.transform = `rotate(${rotationBottom}deg)`;

  window.setTimeout(() => {
    const pickedTop = topItems[sectorAtPointer(rotationTop, topItems.length, POINTER_TOP)];
    const pickedBottom = bottomItems[sectorAtPointer(rotationBottom, bottomItems.length, POINTER_BOTTOM)];

    showResult(pickedTop, pickedBottom);

    wheelTop.classList.remove("spinning");
    wheelBottom.classList.remove("spinning");
    busy = false;
    spinBtn.disabled = false;
  }, duration + 40);
}

function sortAlpha(items) {
  return [...items].sort((a, b) => a.localeCompare(b, "uk", { sensitivity: "base" }));
}

function getItemsRef(kind) {
  return kind === "top" ? topItems : bottomItems;
}

function setItemsRef(kind, items) {
  if (kind === "top") topItems = items;
  else bottomItems = items;
}

function persistWardrobe() {
  topItems = sortAlpha(topItems.map(capitalizeFirstWord));
  bottomItems = sortAlpha(bottomItems.map(capitalizeFirstWord));
  saveWardrobe(topItems, bottomItems);
  rebuildWheels({ clearResult: true });
  refreshAdminLists();
}

function getListSelected(list) {
  return list.dataset.selected || "";
}

function setListSelected(list, value) {
  list.dataset.selected = value || "";
  list.querySelectorAll(".item-option").forEach((btn) => {
    const on = btn.dataset.value === value;
    btn.classList.toggle("selected", on);
    btn.setAttribute("aria-selected", on ? "true" : "false");
  });
}

function refreshAdminLists() {
  document.querySelectorAll(".wardrobe-block").forEach((block) => {
    const kind = block.dataset.kind;
    const list = block.querySelector(".item-list");
    const selected = getListSelected(list);
    const items = getItemsRef(kind);
    list.innerHTML = "";
    items.forEach((text) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "item-option";
      btn.dataset.value = text;
      btn.textContent = text;
      btn.setAttribute("role", "option");
      btn.addEventListener("click", () => {
        setListSelected(list, text);
        setAdminMessage("");
      });
      list.appendChild(btn);
    });
    if (selected && items.includes(selected)) setListSelected(list, selected);
    else setListSelected(list, "");
  });
}

function setAdminMessage(text) {
  adminError.textContent = text || "";
}

function closeEditor(block) {
  const editor = block.querySelector(".item-editor");
  editor.hidden = true;
  editor.dataset.mode = "";
  editor.dataset.original = "";
  block.querySelector(".item-editor-input").value = "";
  block.querySelector(".photo-input").value = "";
  block.querySelector(".photo-name").textContent = "";
}

function openEditor(block, mode, value) {
  document.querySelectorAll(".wardrobe-block").forEach(closeEditor);
  const editor = block.querySelector(".item-editor");
  editor.hidden = false;
  editor.dataset.mode = mode;
  editor.dataset.original = value || "";
  const input = block.querySelector(".item-editor-input");
  input.value = value || "";
  block.querySelector(".photo-name").textContent = "";
  block.querySelector(".photo-input").value = "";
  setAdminMessage("");
  input.focus();
}

function handleBlockAction(block, action) {
  const kind = block.dataset.kind;
  const list = block.querySelector(".item-list");
  const selected = getListSelected(list);

  if (action === "add") {
    openEditor(block, "add", "");
    return;
  }

  if (action === "edit") {
    if (!selected) {
      setAdminMessage("Оберіть позицію");
      return;
    }
    openEditor(block, "edit", selected);
    return;
  }

  if (action === "remove") {
    if (!selected) {
      setAdminMessage("Оберіть позицію");
      return;
    }
    if (!window.confirm(`Ви впевнені, що хочете видалити «${selected}»?`)) return;
    const next = getItemsRef(kind).filter((item) => item !== selected);
    if (!next.length) {
      setAdminMessage("Має залишитись хоча б одна позиція.");
      return;
    }
    setItemsRef(kind, next);
    persistWardrobe();
    setAdminMessage("");
    closeEditor(block);
  }
}

function saveEditor(block) {
  const kind = block.dataset.kind;
  const editor = block.querySelector(".item-editor");
  const mode = editor.dataset.mode;
  const original = editor.dataset.original || "";
  const value = capitalizeFirstWord(block.querySelector(".item-editor-input").value);

  if (!value) {
    setAdminMessage("Введіть назву.");
    return;
  }

  let items = [...getItemsRef(kind)];
  if (mode === "add") {
    if (items.some((item) => item.localeCompare(value, "uk", { sensitivity: "base" }) === 0)) {
      setAdminMessage("Така позиція вже є.");
      return;
    }
    items.push(value);
  } else if (mode === "edit") {
    const idx = items.indexOf(original);
    if (idx < 0) {
      setAdminMessage("Позицію не знайдено.");
      return;
    }
    if (
      items.some(
        (item, i) => i !== idx && item.localeCompare(value, "uk", { sensitivity: "base" }) === 0
      )
    ) {
      setAdminMessage("Така позиція вже є.");
      return;
    }
    items[idx] = value;
  } else {
    return;
  }

  setItemsRef(kind, items);
  persistWardrobe();
  closeEditor(block);
  setAdminMessage("");
  const list = block.querySelector(".item-list");
  setListSelected(list, value);
}

function initAdminBlocks() {
  kindTrigger.addEventListener("click", (e) => {
    e.stopPropagation();
    toggleKindMenu();
  });
  kindMenu.querySelectorAll(".kind-option").forEach((opt) => {
    opt.addEventListener("click", (e) => {
      e.stopPropagation();
      setAdminKind(opt.dataset.kind);
    });
  });
  document.addEventListener("click", (e) => {
    if (!kindMenu.hidden && !wardrobeBlock.querySelector(".kind-picker").contains(e.target)) {
      closeKindMenu();
    }
  });

  document.querySelectorAll(".wardrobe-block").forEach((block) => {
    block.querySelectorAll(".icon-btn").forEach((btn) => {
      btn.addEventListener("click", () => handleBlockAction(block, btn.dataset.action));
    });
    block.querySelector(".editor-save").addEventListener("click", () => saveEditor(block));
    block.querySelector(".editor-cancel").addEventListener("click", () => {
      closeEditor(block);
      setAdminMessage("");
    });
    const photoBtn = block.querySelector(".photo-btn");
    const photoInput = block.querySelector(".photo-input");
    const photoName = block.querySelector(".photo-name");
    if (!photoBtn.disabled) photoBtn.addEventListener("click", () => photoInput.click());
    photoInput.addEventListener("change", () => {
      const file = photoInput.files && photoInput.files[0];
      photoName.textContent = file ? file.name : "";
    });
      });
}

function capitalizeFirstWord(text) {
  const t = String(text).trim();
  if (!t) return t;
  return t.charAt(0).toLocaleUpperCase("uk") + t.slice(1);
}



function openAdmin() {
  setAdminKind("top", { refresh: true });
  setAdminMessage("");
  closeEditor(wardrobeBlock);
  adminModal.classList.add("open");
  document.body.classList.add("modal-open");
}

function closeAdmin() {
  adminModal.classList.remove("open");
  document.body.classList.remove("modal-open");
  adminError.textContent = "";
  closeKindMenu();
  closeEditor(wardrobeBlock);
}



function scheduleRebuild() {
  // Safari fires resize/visualViewport while scrolling (address bar).
  // Rebuild labels only — never hide an existing result.
  if (busy) return;
  window.clearTimeout(resizeTimer);
  resizeTimer = window.setTimeout(() => rebuildWheels({ clearResult: false }), 120);
}

function init() {
  const saved = loadWardrobe();
  topItems = sortAlpha(saved ? saved.top : [...DEFAULT_TOP]);
  bottomItems = sortAlpha(saved ? saved.bottom : [...DEFAULT_BOTTOM]);

  rebuildWheels({ clearResult: true });

  spinBtn.addEventListener("click", spin);
  adminBtn.addEventListener("click", openAdmin);
  document.getElementById("refreshBtn").addEventListener("click", () => location.reload());
  adminClose.addEventListener("click", closeAdmin);
  initAdminBlocks();

  adminModal.addEventListener("click", (event) => {
    if (event.target === adminModal) closeAdmin();
  });

  window.addEventListener("resize", scheduleRebuild);
  window.addEventListener("orientationchange", scheduleRebuild);
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

  </script>
</body>
