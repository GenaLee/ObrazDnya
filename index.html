  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      if (params.has("mobile")) return;
      if (params.has("desktop")) {
        location.replace(new URL("desktop/", location.href).href);
        return;
      }
      var ua = navigator.userAgent || "";
      var isMobile =
        /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua) ||
        (navigator.maxTouchPoints > 1 && /Mac/.test(ua));
      if (!isMobile) {
        location.replace(new URL("desktop/", location.href).href);
      }
    })();
  </script>

  <style>
:root {
  --bg-1: #f3ebe4;
  --bg-2: #e8f0f2;
  --bg-3: #f0e8ef;
  --ink: #4a4458;
  --ink-soft: #7a7388;
  --btn: #c4a8b8;
  --btn-text: #fffaf8;
  --result-bg: #ffffff66;
  --shadow: 0 18px 40px rgba(90, 70, 90, 0.12);
  --pastel-a: #f7d6d0;
  --pastel-b: #d8e8e2;
  --pastel-c: #e4d6f0;
  --pastel-d: #f5e6c8;
  --pastel-e: #cdd9f0;
  --pastel-f: #e8d4d8;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
}

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html {
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(ellipse 90% 55% at 15% 12%, #f8dfe8 0%, transparent 55%),
    radial-gradient(ellipse 80% 45% at 90% 10%, #d9ebe8 0%, transparent 50%),
    radial-gradient(ellipse 70% 50% at 75% 90%, #e6dff0 0%, transparent 50%),
    linear-gradient(165deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
  display: flex;
  flex-direction: column;
  align-items: center;
  padding:
    calc(0.85rem + var(--safe-top))
    calc(1rem + var(--safe-right))
    calc(1.25rem + var(--safe-bottom))
    calc(1rem + var(--safe-left));
  overflow-x: hidden;
  overscroll-behavior-y: none;
  touch-action: manipulation;
}

body.modal-open {
  overflow: hidden;
  position: fixed;
  width: 100%;
}

h1 {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-weight: 600;
  font-size: 1.75rem;
  letter-spacing: 0.02em;
  color: var(--ink);
  margin-bottom: 0.85rem;
  opacity: 0;
  animation: fadeDown 0.8s ease forwards;
}

.spin-btn {
  appearance: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: 0.03em;
  color: var(--btn-text);
  background: linear-gradient(145deg, #d4b4c4, var(--btn) 40%, #b8c9c4);
  min-height: 48px;
  padding: 0.9rem 1.75rem;
  border-radius: 999px;
  box-shadow:
    0 10px 28px rgba(140, 110, 130, 0.28),
    inset 0 1px 0 rgba(255, 255, 255, 0.35);
  transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
  margin-bottom: 1.25rem;
  opacity: 0;
  animation: fadeDown 0.8s ease 0.12s forwards;
}

.spin-btn:active:not(:disabled) {
  transform: scale(0.98);
}

.spin-btn:disabled {
  cursor: not-allowed;
  opacity: 0.72;
  filter: grayscale(0.15);
}

.stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.35rem;
  width: 100%;
  max-width: 360px;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.2s forwards;
}

.wheel-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.55rem;
  width: 100%;
}

.wheel-wrap {
  position: relative;
  width: min(82vw, 320px);
  aspect-ratio: 1;
  filter: drop-shadow(0 14px 24px rgba(100, 80, 100, 0.14));
}

.wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  border: 5px solid rgba(255, 255, 255, 0.75);
  box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.35);
  transition: transform 0s;
  will-change: transform;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

.wheel.spinning {
  transition-timing-function: cubic-bezier(0.08, 0.7, 0.1, 1);
}

.hub {
  position: absolute;
  inset: 50%;
  width: 18%;
  height: 18%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: linear-gradient(145deg, #fff8f5, #e8dce6);
  border: 3px solid rgba(255, 255, 255, 0.9);
  box-shadow: var(--shadow);
  z-index: 2;
  pointer-events: none;
}

.label {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 40%;
  transform-origin: center center;
  text-align: center;
  font-size: clamp(0.62rem, 3.2vw, 0.78rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--ink);
  pointer-events: none;
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
  white-space: normal;
  overflow-wrap: anywhere;
  word-break: break-word;
  hyphens: auto;
}

.caption {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 1.35rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: lowercase;
  color: var(--ink-soft);
}

.arrow {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 52px;
  height: 52px;
  margin: 0.15rem 0 0.35rem;
  color: #9a8798;
  filter: drop-shadow(0 4px 10px rgba(120, 90, 120, 0.18));
  transition: color 0.45s ease;
  transform: rotate(90deg);
}

.arrow.pulse {
  animation: arrowPulse 0.7s ease;
  color: #7d6478;
}

.arrow svg {
  width: 100%;
  height: 100%;
}

.result {
  margin-top: 1.25rem;
  min-height: 4.25rem;
  width: 100%;
  max-width: 360px;
  text-align: center;
  padding: 1rem 1.1rem;
  border-radius: 1.15rem;
  background: var(--result-bg);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}

.result.visible {
  opacity: 1;
  transform: translateY(0);
}

.result-title {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 1.25rem;
  margin-bottom: 0.4rem;
  color: var(--ink-soft);
}

.result-line {
  font-size: 1rem;
  font-weight: 600;
  line-height: 1.55;
}

.result-line span {
  color: #6d5a72;
}

.admin-btn {
  position: fixed;
  top: calc(0.75rem + var(--safe-top));
  left: calc(0.75rem + var(--safe-left));
  z-index: 30;
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 0.75rem;
  cursor: pointer;
  color: #8a7a8c;
  background: rgba(255, 255, 255, 0.62);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  box-shadow: 0 6px 18px rgba(90, 70, 90, 0.12);
  display: grid;
  place-items: center;
  transition: transform 0.2s ease, background 0.2s ease;
}

.admin-btn:active {
  transform: scale(0.96);
}

.admin-btn svg {
  width: 1.15rem;
  height: 1.15rem;
}

.modal {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding:
    calc(0.75rem + var(--safe-top))
    calc(0.75rem + var(--safe-right))
    calc(0.75rem + var(--safe-bottom))
    calc(0.75rem + var(--safe-left));
  background: rgba(74, 68, 88, 0.32);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
}

.modal.open {
  opacity: 1;
  visibility: visible;
}

.modal-card {
  width: 100%;
  max-width: 420px;
  max-height: min(88dvh, 640px);
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  background: linear-gradient(165deg, #faf6f3, #f3eef5);
  border-radius: 1.35rem 1.35rem 1.1rem 1.1rem;
  box-shadow: 0 24px 48px rgba(70, 55, 80, 0.22);
  padding: 1.15rem 1.15rem 1rem;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.34, 1.2, 0.64, 1);
}

.modal.open .modal-card {
  transform: translateY(0);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  margin-bottom: 0.85rem;
}

.modal-header h2 {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--ink);
}

.modal-close {
  border: none;
  background: transparent;
  color: var(--ink-soft);
  font-size: 1.75rem;
  line-height: 1;
  cursor: pointer;
  min-width: 44px;
  min-height: 44px;
  border-radius: 0.5rem;
}

.modal-close:active {
  background: rgba(255, 255, 255, 0.6);
}

.field {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  margin-bottom: 0.9rem;
}

.field label {
  font-family: "Cormorant Garamond", Georgia, serif;
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
}

.field textarea {
  width: 100%;
  min-height: 7.5rem;
  resize: vertical;
  border: 1.5px solid rgba(160, 140, 160, 0.28);
  border-radius: 0.9rem;
  padding: 0.75rem 0.85rem;
  font-family: inherit;
  font-size: 16px;
  line-height: 1.45;
  color: var(--ink);
  background: rgba(255, 255, 255, 0.72);
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.field textarea:focus {
  border-color: rgba(180, 150, 170, 0.7);
  box-shadow: 0 0 0 3px rgba(196, 168, 184, 0.25);
}

.field-hint {
  font-size: 0.78rem;
  color: var(--ink-soft);
  opacity: 0.85;
}

.admin-error {
  min-height: 1.2rem;
  margin-bottom: 0.55rem;
  font-size: 0.85rem;
  color: #b06070;
}

.save-btn {
  appearance: none;
  border: none;
  width: 100%;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
  font-size: 1rem;
  color: var(--btn-text);
  background: linear-gradient(145deg, #d4b4c4, var(--btn) 40%, #b8c9c4);
  min-height: 48px;
  padding: 0.85rem 1.2rem;
  border-radius: 999px;
  box-shadow: 0 8px 20px rgba(140, 110, 130, 0.22);
  transition: transform 0.2s ease;
}

.save-btn:active {
  transform: scale(0.98);
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes arrowPulse {
  0% { transform: rotate(90deg) scale(1); }
  40% { transform: rotate(90deg) scale(1.18); }
  100% { transform: rotate(90deg) scale(1); }
}

@media (orientation: landscape) and (max-height: 500px) {
  body {
    padding-top: calc(0.5rem + var(--safe-top));
    padding-bottom: calc(0.5rem + var(--safe-bottom));
  }

  h1 {
    font-size: 1.35rem;
    margin-bottom: 0.45rem;
  }

  .spin-btn {
    margin-bottom: 0.65rem;
    padding-block: 0.65rem;
  }

  .wheel-wrap {
    width: min(38vh, 220px);
  }

  .stage {
    gap: 0.15rem;
  }

  .result {
    margin-top: 0.65rem;
    min-height: 3rem;
    padding: 0.65rem 0.85rem;
  }
}

  </style>

  <script>
const STORAGE_KEY = "wardrobe-wheels-v1";

const DEFAULT_TOP = [
  "біла блузка",
  "синя футболка",
  "блакитна блуза",
  "біла блузка з квітами",
];

const DEFAULT_BOTTOM = [
  "чорні штани",
  "жовті штани",
  "чорна спідниця",
  "сіра спідниця",
  "білі штани",
];

const PASTELS = [
  "var(--pastel-a)",
  "var(--pastel-b)",
  "var(--pastel-c)",
  "var(--pastel-d)",
  "var(--pastel-e)",
  "var(--pastel-f)",
];

/**
 * Vertical mobile layout:
 * top wheel → bottom edge toward arrow = 180°
 * bottom wheel → top edge toward arrow = 0°
 */
const POINTER_TOP = 180;
const POINTER_BOTTOM = 0;

const wheelTop = document.getElementById("wheelTop");
const wheelBottom = document.getElementById("wheelBottom");
const spinBtn = document.getElementById("spinBtn");
const result = document.getElementById("result");
const resultText = document.getElementById("resultText");
const arrow = document.getElementById("arrow");
const adminBtn = document.getElementById("adminBtn");
const adminModal = document.getElementById("adminModal");
const adminClose = document.getElementById("adminClose");
const adminForm = document.getElementById("adminForm");
const topItemsInput = document.getElementById("topItemsInput");
const bottomItemsInput = document.getElementById("bottomItemsInput");
const adminError = document.getElementById("adminError");

let topItems = [];
let bottomItems = [];
let rotationTop = 0;
let rotationBottom = 0;
let busy = false;
let resizeTimer = null;

function loadWardrobe() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (
      !Array.isArray(data.top) ||
      !Array.isArray(data.bottom) ||
      !data.top.length ||
      !data.bottom.length
    ) {
      return null;
    }
    return {
      top: data.top.map(String),
      bottom: data.bottom.map(String),
    };
  } catch {
    return null;
  }
}

function saveWardrobe(top, bottom) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ top, bottom }));
}

function assignSectorColors(count) {
  const colors = [];
  for (let i = 0; i < count; i++) {
    const prev = i > 0 ? colors[i - 1] : null;
    const wrap = i === count - 1 && count > 1 ? colors[0] : null;
    let idx = i % PASTELS.length;
    let chosen = PASTELS[idx];
    for (let attempt = 0; attempt < PASTELS.length; attempt++) {
      const candidate = PASTELS[(idx + attempt) % PASTELS.length];
      if (candidate !== prev && candidate !== wrap) {
        chosen = candidate;
        break;
      }
    }
    colors.push(chosen);
  }
  return colors;
}

function buildWheel(el, items, direction = "outward") {
  const n = items.length;
  const step = 360 / n;
  const sectorColors = assignSectorColors(n);
  const stops = items
    .map((_, i) => `${sectorColors[i]} ${i * step}deg ${(i + 1) * step}deg`)
    .join(", ");

  el.style.background = `conic-gradient(from -${step / 2}deg, ${stops})`;
  el.innerHTML = "";

  const radius = el.clientWidth * 0.30;
  const fontScale = n > 8 ? Math.max(0.55, 1 - (n - 8) * 0.04) : 1;
  const textAngle = direction === "inward" ? 90 : -90;

  items.forEach((text, i) => {
    const label = document.createElement("div");
    label.className = "label";
    label.style.fontSize = `calc(${fontScale} * clamp(0.62rem, 3.2vw, 0.78rem))`;
    const mid = i * step;
    label.style.transform =
      `translate(-50%, -50%) rotate(${mid}deg) translateY(${-radius}px) rotate(${textAngle}deg)`;
    label.textContent = text;
    el.appendChild(label);
  });
}

function rebuildWheels({ clearResult = false } = {}) {
  const topAngle = normalizeAngle(rotationTop);
  const bottomAngle = normalizeAngle(rotationBottom);
  buildWheel(wheelTop, topItems, "outward");
  buildWheel(wheelBottom, bottomItems, "inward");
  wheelTop.style.transition = "none";
  wheelBottom.style.transition = "none";
  rotationTop = topAngle;
  rotationBottom = bottomAngle;
  wheelTop.style.transform = `rotate(${rotationTop}deg)`;
  wheelBottom.style.transform = `rotate(${rotationBottom}deg)`;
  if (clearResult) {
    result.classList.remove("visible");
  }
}

function showResult(pickedTop, pickedBottom) {
  resultText.innerHTML =
    `<span>верх:</span> ${pickedTop}<br><span>низ:</span> ${pickedBottom}`;
  result.classList.add("visible");
  // Smooth scroll so the final outfit is in view (esp. Safari with address bar)
  window.requestAnimationFrame(() => {
    result.scrollIntoView({ behavior: "smooth", block: "center" });
  });
}

function normalizeAngle(deg) {
  return ((deg % 360) + 360) % 360;
}

function sectorAtPointer(rotation, itemCount, pointerAngle) {
  const step = 360 / itemCount;
  const local = normalizeAngle(pointerAngle - rotation);
  return Math.round(local / step) % itemCount;
}

function randomDurationMs() {
  return 5000 + Math.random() * 5000;
}

function randomExtraTurns() {
  return 6 + Math.floor(Math.random() * 5);
}

function targetRotation(current, itemCount, pointerAngle, targetIndex) {
  const step = 360 / itemCount;
  const desiredMod = normalizeAngle(pointerAngle - targetIndex * step);
  const currentMod = normalizeAngle(current);
  let delta = normalizeAngle(desiredMod - currentMod);
  delta += randomExtraTurns() * 360;
  return current + delta;
}

function spin() {
  if (busy) return;
  if (!topItems.length || !bottomItems.length) return;

  busy = true;
  spinBtn.disabled = true;
  result.classList.remove("visible");

  const duration = randomDurationMs();
  const topIndex = Math.floor(Math.random() * topItems.length);
  const bottomIndex = Math.floor(Math.random() * bottomItems.length);

  rotationTop = targetRotation(rotationTop, topItems.length, POINTER_TOP, topIndex);
  rotationBottom = targetRotation(rotationBottom, bottomItems.length, POINTER_BOTTOM, bottomIndex);

  wheelTop.classList.add("spinning");
  wheelBottom.classList.add("spinning");
  wheelTop.style.transition = `transform ${duration}ms cubic-bezier(0.08, 0.72, 0.12, 1)`;
  wheelBottom.style.transition = `transform ${duration}ms cubic-bezier(0.05, 0.68, 0.1, 1)`;
  wheelTop.style.transform = `rotate(${rotationTop}deg)`;
  wheelBottom.style.transform = `rotate(${rotationBottom}deg)`;

  window.setTimeout(() => {
    const pickedTop = topItems[sectorAtPointer(rotationTop, topItems.length, POINTER_TOP)];
    const pickedBottom = bottomItems[sectorAtPointer(rotationBottom, bottomItems.length, POINTER_BOTTOM)];

    showResult(pickedTop, pickedBottom);
    arrow.classList.remove("pulse");
    void arrow.offsetWidth;
    arrow.classList.add("pulse");

    wheelTop.classList.remove("spinning");
    wheelBottom.classList.remove("spinning");
    busy = false;
    spinBtn.disabled = false;
  }, duration + 40);
}

function parseLines(text) {
  return text
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter(Boolean);
}

function openAdmin() {
  topItemsInput.value = topItems.join("\n");
  bottomItemsInput.value = bottomItems.join("\n");
  adminError.textContent = "";
  adminModal.classList.add("open");
  document.body.classList.add("modal-open");
}

function closeAdmin() {
  adminModal.classList.remove("open");
  document.body.classList.remove("modal-open");
  adminError.textContent = "";
}

function saveAdmin(event) {
  event.preventDefault();
  const nextTop = parseLines(topItemsInput.value);
  const nextBottom = parseLines(bottomItemsInput.value);

  if (!nextTop.length || !nextBottom.length) {
    adminError.textContent = "Додайте хоча б один рядок у кожне поле.";
    return;
  }

  topItems = nextTop;
  bottomItems = nextBottom;
  saveWardrobe(topItems, bottomItems);
  rebuildWheels({ clearResult: true });
  closeAdmin();
}

function scheduleRebuild() {
  // Safari fires resize/visualViewport while scrolling (address bar).
  // Rebuild labels only — never hide an existing result.
  if (busy) return;
  window.clearTimeout(resizeTimer);
  resizeTimer = window.setTimeout(() => rebuildWheels({ clearResult: false }), 120);
}

function init() {
  const saved = loadWardrobe();
  topItems = saved ? saved.top : [...DEFAULT_TOP];
  bottomItems = saved ? saved.bottom : [...DEFAULT_BOTTOM];

  rebuildWheels({ clearResult: true });

  spinBtn.addEventListener("click", spin);
  adminBtn.addEventListener("click", openAdmin);
  adminClose.addEventListener("click", closeAdmin);
  adminForm.addEventListener("submit", saveAdmin);

  adminModal.addEventListener("click", (event) => {
    if (event.target === adminModal) closeAdmin();
  });

  window.addEventListener("resize", scheduleRebuild);
  window.addEventListener("orientationchange", scheduleRebuild);
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

  </script>
